<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MzansiBuilds – Celebration Wall</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --green-dark: #0f3d1f;
        --green-main: #1a5c2a;
        --green-light: #2d8c47;
        --green-pale: #eaf3de;
        --black: #0d0d0d;
        --white: #ffffff;
        --gray: #f5f5f3;
        --gray-border: #e0e0dc;
        --text-muted: #6b7280;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--gray);
        min-height: 100vh;
        overflow-x: hidden;
      }

      canvas#confetti-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 999;
      }

      nav {
        background: var(--green-dark);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      nav h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--white);
      }
      nav h1 span {
        color: #2d8c47;
      }
      .nav-links {
        display: flex;
        gap: 6px;
      }
      .nav-links a {
        color: #9ca3af;
        text-decoration: none;
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 20px;
        transition: all 0.2s;
      }
      .nav-links a.active,
      .nav-links a:hover {
        background: var(--green-main);
        color: var(--white);
      }

      .main {
        max-width: 700px;
        margin: 0 auto;
        padding: 24px 16px;
      }

      .wall-header {
        text-align: center;
        margin-bottom: 32px;
        padding: 40px 20px;
        background: var(--green-dark);
        border-radius: 20px;
        color: var(--white);
        position: relative;
        overflow: hidden;
        cursor: pointer;
      }
      .wall-header::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at 50% 0%,
          #2d8c4744 0%,
          transparent 70%
        );
      }
      .wall-header h2 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 8px;
        position: relative;
      }
      .wall-header p {
        font-size: 14px;
        color: #9ca3af;
        position: relative;
      }

      .confetti-emoji {
        font-size: 40px;
        margin-bottom: 12px;
        display: block;
        animation: bounce 1s infinite alternate;
      }
      @keyframes bounce {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-10px);
        }
      }

      .tap-hint {
        font-size: 12px;
        color: #2d8c47;
        margin-top: 10px;
        position: relative;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: var(--white);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
        border: 1px solid var(--gray-border);
        transition: transform 0.2s;
      }
      .stat-card:hover {
        transform: translateY(-2px);
      }
      .stat-card strong {
        display: block;
        font-family: "Space Grotesk", sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--green-main);
      }
      .stat-card span {
        font-size: 12px;
        color: var(--text-muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 14px;
      }

      .dev-card {
        background: var(--white);
        border-radius: 14px;
        padding: 20px;
        border: 1px solid var(--gray-border);
        text-align: center;
        transition:
          box-shadow 0.2s,
          transform 0.2s;
        animation: popIn 0.4s ease forwards;
        opacity: 0;
      }
      @keyframes popIn {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .dev-card:hover {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        transform: translateY(-4px);
      }

      .dev-avatar {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: var(--green-main);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--white);
        font-size: 20px;
        font-weight: 700;
        font-family: "Space Grotesk", sans-serif;
        margin: 0 auto 12px;
        border: 3px solid var(--green-pale);
      }
      .dev-card h3 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 15px;
        font-weight: 700;
        color: var(--black);
        margin-bottom: 4px;
      }
      .dev-card .project-name {
        font-size: 13px;
        color: var(--green-main);
        font-weight: 500;
        margin-bottom: 8px;
      }
      .dev-card .desc {
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.5;
        margin-bottom: 12px;
      }
      .completed-date {
        font-size: 11px;
        background: var(--green-pale);
        color: var(--green-dark);
        padding: 3px 10px;
        border-radius: 20px;
        display: inline-block;
      }
      .new-badge {
        background: var(--green-main);
        color: var(--white);
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 20px;
        display: inline-block;
        margin-bottom: 8px;
        font-weight: 500;
      }
      .loading {
        text-align: center;
        padding: 20px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <canvas id="confetti-canvas"></canvas>

    <nav>
      <h1>Mzansi<span>Builds</span></h1>
      <div class="nav-links">
        <a href="feed.html">Feed</a>
        <a href="projects.html">My Projects</a>
        <a href="wall.html" class="active">Wall 🎉</a>
        <a href="index.html">Sign Out</a>
      </div>
    </nav>

    <div class="main">
      <div class="wall-header" onclick="launchConfetti()">
        <span class="confetti-emoji">🎉</span>
        <h2>Celebration Wall</h2>
        <p>Developers who built in public and shipped their projects</p>
        <p class="tap-hint">Tap to celebrate! 🎊</p>
      </div>

      <div class="stats">
        <div class="stat-card">
          <strong id="total-count">0</strong><span>Projects Shipped</span>
        </div>
        <div class="stat-card"><strong>🇿🇦</strong><span>Built in SA</span></div>
        <div class="stat-card">
          <strong>100%</strong><span>Built in Public</span>
        </div>
      </div>

      <div class="grid" id="wall-grid">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
      const supabase = createClient(
        "https://soqkgdjjupqxjvmpsuxd.supabase.co",
        "sb_publishable_EP-CaxQNoNQwsdQuKbMh7w_vInlh_eF",
      );

      const colors = [
        "#1a5c2a",
        "#2d8c47",
        "#f59e0b",
        "#ef4444",
        "#3b82f6",
        "#8b5cf6",
        "#ec4899",
        "#10b981",
      ];

      window.launchConfetti = function () {
        const canvas = document.getElementById("confetti-canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const pieces = Array.from({ length: 150 }, () => ({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          w: Math.random() * 12 + 6,
          h: Math.random() * 6 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          rot: Math.random() * 360,
          speed: Math.random() * 4 + 2,
          spin: Math.random() * 6 - 3,
          drift: Math.random() * 2 - 1,
        }));

        let frame;
        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          let done = true;
          pieces.forEach((p) => {
            p.y += p.speed;
            p.x += p.drift;
            p.rot += p.spin;
            if (p.y < canvas.height) done = false;
            ctx.save();
            ctx.translate(p.x + p.w / 2, p.y + p.h / 2);
            ctx.rotate((p.rot * Math.PI) / 180);
            ctx.fillStyle = p.color;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
          });
          if (!done) frame = requestAnimationFrame(animate);
          else ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        cancelAnimationFrame(frame);
        animate();
      };

      function getInitials(name) {
        return name
          .split(" ")
          .map((w) => w[0])
          .join("")
          .toUpperCase()
          .slice(0, 2);
      }

      const avatarColors = [
        "#1a5c2a",
        "#0f3d1f",
        "#333",
        "#1a3a5c",
        "#5c1a1a",
        "#2d4a8c",
      ];

      async function loadWall() {
        const { data: projects } = await supabase
          .from("projects")
          .select("*")
          .eq("is_completed", true)
          .order("created_at", { ascending: false });

        const grid = document.getElementById("wall-grid");
        document.getElementById("total-count").textContent =
          projects?.length || 0;

        if (!projects || projects.length === 0) {
          grid.innerHTML =
            '<div class="loading">No completed projects yet. Be the first! 🚀</div>';
          return;
        }

        grid.innerHTML = projects
          .map(
            (p, i) => `
        <div class="dev-card" style="animation-delay: ${i * 0.1}s">
          ${i === 0 ? '<div class="new-badge">NEW</div>' : ""}
          <div class="dev-avatar" style="background:${avatarColors[i % avatarColors.length]}">${getInitials(p.author_name || "U")}</div>
          <h3>${p.author_name || "Anonymous"}</h3>
          <div class="project-name">${p.name}</div>
          <div class="desc">${p.description || "Built in public on MzansiBuilds 🚀"}</div>
          <span class="completed-date">${new Date(p.created_at).toLocaleDateString("en-ZA", { month: "long", year: "numeric" })}</span>
        </div>
      `,
          )
          .join("");

        setTimeout(() => launchConfetti(), 500);
      }

      loadWall();
    </script>
  </body>
</html>
