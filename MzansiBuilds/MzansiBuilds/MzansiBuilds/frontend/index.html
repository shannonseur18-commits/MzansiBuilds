<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MzansiBuilds – Build in Public</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --green-dark: #0f3d1f;
        --green-main: #1a5c2a;
        --green-light: #2d8c47;
        --green-pale: #eaf3de;
        --black: #0d0d0d;
        --white: #ffffff;
        --gray: #f5f5f3;
        --gray-border: #e0e0dc;
        --text-muted: #6b7280;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--black);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background-image:
          radial-gradient(ellipse at 20% 50%, #0f3d1f44 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, #1a5c2a33 0%, transparent 50%);
      }
      .container {
        width: 100%;
        max-width: 440px;
      }
      .logo {
        text-align: center;
        margin-bottom: 36px;
      }
      .logo h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 32px;
        font-weight: 700;
        color: var(--white);
        letter-spacing: -1px;
      }
      .logo h1 span {
        color: var(--green-light);
      }
      .logo p {
        font-size: 13px;
        color: #9ca3af;
        margin-top: 6px;
      }
      .card {
        background: var(--white);
        border-radius: 16px;
        padding: 36px;
        border: 1px solid var(--gray-border);
      }
      .tabs {
        display: flex;
        background: var(--gray);
        border-radius: 10px;
        padding: 4px;
        margin-bottom: 28px;
      }
      .tab {
        flex: 1;
        padding: 10px;
        text-align: center;
        font-size: 14px;
        font-weight: 500;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--text-muted);
        border: none;
        background: transparent;
      }
      .tab.active {
        background: var(--green-main);
        color: var(--white);
      }
      .form-group {
        margin-bottom: 18px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: var(--black);
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid var(--gray-border);
        border-radius: 10px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        color: var(--black);
        background: var(--white);
        transition: border-color 0.2s;
        outline: none;
      }
      input:focus {
        border-color: var(--green-main);
      }
      .btn {
        width: 100%;
        padding: 13px;
        background: var(--green-main);
        color: var(--white);
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 500;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.2s;
      }
      .btn:hover {
        background: var(--green-dark);
      }
      .error {
        color: red;
        font-size: 13px;
        margin-top: 8px;
        text-align: center;
      }
      .success {
        color: var(--green-main);
        font-size: 13px;
        margin-top: 8px;
        text-align: center;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <h1>Mzansi<span>Builds</span></h1>
        <p>Build in public. Grow together. 🇿🇦</p>
      </div>
      <div class="card">
        <div class="tabs">
          <button class="tab active" onclick="showTab('login')">Sign In</button>
          <button class="tab" onclick="showTab('register')">Register</button>
        </div>
        <div id="login-form">
          <div class="form-group">
            <label>Email address</label>
            <input
              type="email"
              id="login-email"
              placeholder="you@example.com"
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" placeholder="••••••••" />
          </div>
          <button class="btn" onclick="login()">Sign In</button>
          <p id="login-msg"></p>
        </div>
        <div id="register-form" class="hidden">
          <div class="form-group">
            <label>Full name</label>
            <input type="text" id="reg-name" placeholder="Shannon Seur" />
          </div>
          <div class="form-group">
            <label>Email address</label>
            <input type="email" id="reg-email" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input
              type="password"
              id="reg-password"
              placeholder="Create a password"
            />
          </div>
          <button class="btn" onclick="register()">Create Account</button>
          <p id="reg-msg"></p>
        </div>
      </div>
    </div>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const supabase = createClient(
        "https://soqkgdjjupqxjvmpsuxd.supabase.co",
        "sb_publishable_EP-CaxQNoNQwsdQuKbMh7w_vInlh_eF",
      );

      window.showTab = function (tab) {
        document
          .getElementById("login-form")
          .classList.toggle("hidden", tab !== "login");
        document
          .getElementById("register-form")
          .classList.toggle("hidden", tab !== "register");
        document.querySelectorAll(".tab").forEach((t, i) => {
          t.classList.toggle(
            "active",
            (tab === "login" && i === 0) || (tab === "register" && i === 1),
          );
        });
      };

      window.register = async function () {
        const fullName = document.getElementById("reg-name").value.trim();
        const email = document.getElementById("reg-email").value.trim();
        const password = document.getElementById("reg-password").value;
        const msg = document.getElementById("reg-msg");

        if (!fullName || !email || !password) {
          msg.className = "error";
          msg.textContent = "Please fill in all fields!";
          return;
        }

        const { data, error } = await supabase.auth.signUp({
          email,
          password,
          options: { data: { full_name: fullName } },
        });

        if (error) {
          msg.className = "error";
          msg.textContent = error.message;
          return;
        }

        await supabase.from("users").insert({ full_name: fullName, email });
        msg.className = "success";
        msg.textContent = "Account created! Signing you in...";
        localStorage.setItem("user_name", fullName);
        localStorage.setItem("user_email", email);
        setTimeout(() => (window.location.href = "feed.html"), 1500);
      };

      window.login = async function () {
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        const msg = document.getElementById("login-msg");

        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password,
        });

        if (error) {
          msg.className = "error";
          msg.textContent = "Invalid email or password!";
          return;
        }

        const fullName = data.user.user_metadata?.full_name || email;
        localStorage.setItem("user_name", fullName);
        localStorage.setItem("user_email", email);
        window.location.href = "feed.html";
      };
    </script>
  </body>
</html>
