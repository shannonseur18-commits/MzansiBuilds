<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MzansiBuilds – My Projects</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --green-dark: #0f3d1f;
        --green-main: #1a5c2a;
        --green-light: #2d8c47;
        --green-pale: #eaf3de;
        --black: #0d0d0d;
        --white: #ffffff;
        --gray: #f5f5f3;
        --gray-border: #e0e0dc;
        --text-muted: #6b7280;
        --red: #ef4444;
        --red-pale: #fef2f2;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--gray);
        min-height: 100vh;
      }
      nav {
        background: var(--green-dark);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      nav h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--white);
      }
      nav h1 span {
        color: #2d8c47;
      }
      .nav-links {
        display: flex;
        gap: 6px;
      }
      .nav-links a {
        color: #9ca3af;
        text-decoration: none;
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 20px;
        transition: all 0.2s;
      }
      .nav-links a.active,
      .nav-links a:hover {
        background: var(--green-main);
        color: var(--white);
      }
      .main {
        max-width: 700px;
        margin: 0 auto;
        padding: 24px 16px;
      }

      /* Page header with title and new project button */
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .page-header h2 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--black);
      }
      .btn-new {
        background: var(--green-main);
        color: var(--white);
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 500;
        font-family: "Inter", sans-serif;
        cursor: pointer;
      }
      .btn-new:hover {
        background: var(--green-dark);
      }

      /* Description text explaining what this page does */
      .page-desc {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 20px;
        background: var(--white);
        border-radius: 10px;
        padding: 12px 16px;
        border: 1px solid var(--gray-border);
        border-left: 4px solid var(--green-main);
      }

      /* Modal overlay for creating a new project */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 200;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: var(--white);
        border-radius: 16px;
        padding: 28px;
        width: 100%;
        max-width: 480px;
      }
      .modal h3 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 18px;
        margin-bottom: 20px;
        color: var(--black);
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: var(--black);
        margin-bottom: 6px;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid var(--gray-border);
        border-radius: 10px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        color: var(--black);
        outline: none;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--green-main);
      }
      textarea {
        resize: none;
        height: 80px;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .btn-cancel {
        flex: 1;
        padding: 11px;
        background: var(--gray);
        color: var(--black);
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        cursor: pointer;
      }
      .btn-save {
        flex: 1;
        padding: 11px;
        background: var(--green-main);
        color: var(--white);
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        font-family: "Inter", sans-serif;
        cursor: pointer;
      }
      .btn-save:hover {
        background: var(--green-dark);
      }

      /* Project cards */
      .project-card {
        background: var(--white);
        border-radius: 14px;
        padding: 20px;
        border: 1px solid var(--gray-border);
        margin-bottom: 16px;
      }
      .project-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .project-title h3 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 16px;
        font-weight: 700;
        color: var(--black);
      }
      .project-title p {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 3px;
      }
      .badges {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .badge {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 20px;
        font-weight: 500;
      }
      .badge-green {
        background: var(--green-pale);
        color: var(--green-dark);
      }
      .badge-yellow {
        background: #fef3c7;
        color: #92400e;
      }

      /* Milestones list */
      .milestones h4 {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 10px;
      }
      .milestone {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid var(--gray-border);
        font-size: 13px;
        color: var(--black);
      }
      .milestone:last-of-type {
        border-bottom: none;
      }
      .milestone-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--green-main);
        flex-shrink: 0;
      }
      .add-milestone {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .add-milestone input {
        flex: 1;
        padding: 8px 12px;
        font-size: 13px;
      }
      .add-milestone button {
        background: var(--green-main);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 8px 14px;
        font-size: 13px;
        cursor: pointer;
        font-family: "Inter", sans-serif;
      }

      /* Project action buttons */
      .project-actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }
      .complete-btn {
        flex: 1;
        padding: 10px;
        background: var(--black);
        color: var(--white);
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        transition: background 0.2s;
      }
      .complete-btn:hover {
        background: #333;
      }

      /* Delete button - red to indicate destructive action */
      .delete-btn {
        padding: 10px 16px;
        background: var(--red-pale);
        color: var(--red);
        border: 1px solid #fecaca;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        transition: all 0.2s;
      }
      .delete-btn:hover {
        background: var(--red);
        color: var(--white);
      }

      .loading {
        text-align: center;
        padding: 20px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <nav>
      <h1>Mzansi<span>Builds</span></h1>
      <div class="nav-links">
        <a href="feed.html">Feed</a>
        <a href="projects.html" class="active">My Projects</a>
        <a href="wall.html">Wall 🎉</a>
        <a href="index.html">Sign Out</a>
      </div>
    </nav>

    <div class="main">
      <div class="page-header">
        <h2>My Projects</h2>
        <button class="btn-new" onclick="openModal()">+ New Project</button>
      </div>

      <!-- Description explaining what this page does -->
      <div class="page-desc">
        📁 Track all the projects you are working on. Add milestones to show
        your progress and mark projects complete to appear on the Celebration
        Wall!
      </div>

      <!-- Modal for creating a new project -->
      <div class="modal-overlay" id="modal">
        <div class="modal">
          <h3>Create New Project</h3>
          <div class="form-group">
            <label>Project name</label>
            <input type="text" id="proj-name" placeholder="e.g. BudgetApp" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea
              id="proj-desc"
              placeholder="What are you building?"
            ></textarea>
          </div>
          <div class="form-group">
            <label>Stage</label>
            <select id="proj-stage">
              <option>Planning</option>
              <option>In Progress</option>
              <option>Testing</option>
              <option>Completed</option>
            </select>
          </div>
          <div class="form-group">
            <label>Support needed</label>
            <select id="proj-support">
              <option>No support needed</option>
              <option>Need a designer</option>
              <option>Need a backend dev</option>
              <option>Need a frontend dev</option>
              <option>Need feedback</option>
            </select>
          </div>
          <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveProject()">
              Save Project
            </button>
          </div>
        </div>
      </div>

      <!-- Projects list loaded from Supabase -->
      <div id="projects-list">
        <div class="loading">Loading your projects...</div>
      </div>
    </div>

    <script type="module">
      // Import Supabase client
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      // Initialise Supabase with project URL and public key
      const supabase = createClient(
        "https://soqkgdjjupqxjvmpsuxd.supabase.co",
        "sb_publishable_EP-CaxQNoNQwsdQuKbMh7w_vInlh_eF",
      );

      // Get logged in user name from localStorage
      const userName = localStorage.getItem("user_name") || "Anonymous";

      // Load all projects for the current user from Supabase
      async function loadProjects() {
        const { data: projects } = await supabase
          .from("projects")
          .select("*, milestones(*)")
          .eq("author_name", userName)
          .order("created_at", { ascending: false });

        const list = document.getElementById("projects-list");

        if (!projects || projects.length === 0) {
          list.innerHTML =
            '<div class="loading">No projects yet. Click "+ New Project" to get started!</div>';
          return;
        }

        // Render each project as a card
        list.innerHTML = projects
          .map(
            (p) => `
        <div class="project-card">
          <div class="project-header">
            <div class="project-title">
              <h3>${p.name}</h3>
              <p>${p.description || ""}</p>
            </div>
          </div>
          <div class="badges">
            <span class="badge badge-green">${p.stage}</span>
            <span class="badge badge-yellow">${p.support_needed}</span>
          </div>
          <div class="milestones">
            <h4>Milestones</h4>
            ${(p.milestones || [])
              .map(
                (m) => `
              <div class="milestone">
                <div class="milestone-dot"></div>${m.title}
              </div>
            `,
              )
              .join("")}
            <div class="add-milestone">
              <input type="text" placeholder="Add a milestone..." id="ms-${p.id}"/>
              <button onclick="addMilestone('${p.id}', 'ms-${p.id}')">Add</button>
            </div>
          </div>
          <div class="project-actions">
            ${
              !p.is_completed
                ? `<button class="complete-btn" onclick="completeProject('${p.id}')">Mark as Completed 🎉</button>`
                : `<p style="text-align:center;color:var(--green-main);font-weight:500;padding:10px;">✅ Completed!</p>`
            }
            <button class="delete-btn" onclick="deleteProject('${p.id}')">🗑 Delete</button>
          </div>
        </div>
      `,
          )
          .join("");
      }

      // Open the new project modal
      window.openModal = () =>
        document.getElementById("modal").classList.add("open");

      // Close the new project modal
      window.closeModal = () =>
        document.getElementById("modal").classList.remove("open");

      // Save a new project to Supabase
      window.saveProject = async function () {
        const name = document.getElementById("proj-name").value.trim();
        if (!name) return alert("Please enter a project name!");

        await supabase.from("projects").insert({
          name,
          description: document.getElementById("proj-desc").value,
          stage: document.getElementById("proj-stage").value,
          support_needed: document.getElementById("proj-support").value,
          author_name: userName,
        });

        closeModal();
        loadProjects();
      };

      // Add a milestone to a project
      window.addMilestone = async function (projectId, inputId) {
        const input = document.getElementById(inputId);
        const text = input.value.trim();
        if (!text) return;
        await supabase.from("milestones").insert({
          title: text,
          project_id: projectId,
        });
        input.value = "";
        loadProjects();
      };

      // Mark a project as completed — it will appear on the Celebration Wall
      window.completeProject = async function (projectId) {
        await supabase
          .from("projects")
          .update({ is_completed: true })
          .eq("id", projectId);
        loadProjects();
      };

      // Delete a project and its milestones after user confirms
      window.deleteProject = async function (projectId) {
        const confirmed = confirm(
          "Are you sure you want to delete this project? This cannot be undone.",
        );
        if (!confirmed) return;

        // Delete milestones first due to foreign key relationship
        await supabase.from("milestones").delete().eq("project_id", projectId);

        // Then delete the project itself
        await supabase.from("projects").delete().eq("id", projectId);

        loadProjects();
      };

      // Load projects when page opens
      loadProjects();
    </script>
  </body>
</html>
