<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MzansiBuilds – My Projects</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --green-dark: #0f3d1f;
        --green-main: #1a5c2a;
        --green-light: #2d8c47;
        --green-pale: #eaf3de;
        --black: #0d0d0d;
        --white: #ffffff;
        --gray: #f5f5f3;
        --gray-border: #e0e0dc;
        --text-muted: #6b7280;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--gray);
        min-height: 100vh;
      }
      nav {
        background: var(--green-dark);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      nav h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--white);
      }
      nav h1 span {
        color: #2d8c47;
      }
      .nav-links {
        display: flex;
        gap: 6px;
      }
      .nav-links a {
        color: #9ca3af;
        text-decoration: none;
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 20px;
        transition: all 0.2s;
      }
      .nav-links a.active,
      .nav-links a:hover {
        background: var(--green-main);
        color: var(--white);
      }
      .main {
        max-width: 700px;
        margin: 0 auto;
        padding: 24px 16px;
      }
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .page-header h2 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: var(--black);
      }
      .btn-new {
        background: var(--green-main);
        color: var(--white);
        border: none;
        border-radius: 8px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 500;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-new:hover {
        background: var(--green-dark);
      }
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 200;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal-overlay.open {
        display: flex;
      }
      .modal {
        background: var(--white);
        border-radius: 16px;
        padding: 28px;
        width: 100%;
        max-width: 480px;
      }
      .modal h3 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 18px;
        margin-bottom: 20px;
        color: var(--black);
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: var(--black);
        margin-bottom: 6px;
      }
      input,
      select,
      textarea {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid var(--gray-border);
        border-radius: 10px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        color: var(--black);
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--green-main);
      }
      textarea {
        resize: none;
        height: 80px;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .btn-cancel {
        flex: 1;
        padding: 11px;
        background: var(--gray);
        color: var(--black);
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        cursor: pointer;
      }
      .btn-save {
        flex: 1;
        padding: 11px;
        background: var(--green-main);
        color: var(--white);
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        font-family: "Inter", sans-serif;
        cursor: pointer;
      }
      .btn-save:hover {
        background: var(--green-dark);
      }
      .project-card {
        background: var(--white);
        border-radius: 14px;
        padding: 20px;
        border: 1px solid var(--gray-border);
        margin-bottom: 16px;
      }
      .project-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .project-header h3 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 16px;
        font-weight: 700;
        color: var(--black);
      }
      .project-header p {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 3px;
      }
      .badges {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .badge {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 20px;
        font-weight: 500;
      }
      .badge-green {
        background: var(--green-pale);
        color: var(--green-dark);
      }
      .badge-yellow {
        background: #fef3c7;
        color: #92400e;
      }
      .badge-black {
        background: #f3f4f6;
        color: var(--black);
      }
      .milestones {
        margin-top: 14px;
      }
      .milestones h4 {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 10px;
      }
      .milestone {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid var(--gray-border);
        font-size: 13px;
        color: var(--black);
      }
      .milestone:last-of-type {
        border-bottom: none;
      }
      .milestone-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--green-main);
        flex-shrink: 0;
      }
      .milestone-dot.pending {
        background: var(--gray-border);
      }
      .add-milestone {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .add-milestone input {
        flex: 1;
        padding: 8px 12px;
        font-size: 13px;
      }
      .add-milestone button {
        background: var(--green-main);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 8px 14px;
        font-size: 13px;
        cursor: pointer;
        font-family: "Inter", sans-serif;
      }
      .complete-btn {
        margin-top: 14px;
        width: 100%;
        padding: 10px;
        background: var(--black);
        color: var(--white);
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        transition: background 0.2s;
      }
      .complete-btn:hover {
        background: #333;
      }
    </style>
  </head>
  <body>
    <nav>
      <h1>Mzansi<span>Builds</span></h1>
      <div class="nav-links">
        <a href="feed.html">Feed</a>
        <a href="projects.html" class="active">My Projects</a>
        <a href="wall.html">Wall 🎉</a>
        <a href="index.html">Sign Out</a>
      </div>
    </nav>

    <div class="main">
      <div class="page-header">
        <h2>My Projects</h2>
        <button class="btn-new" onclick="openModal()">+ New Project</button>
      </div>

      <!-- NEW PROJECT MODAL -->
      <div class="modal-overlay" id="modal">
        <div class="modal">
          <h3>Create New Project</h3>
          <div class="form-group">
            <label>Project name</label>
            <input type="text" id="proj-name" placeholder="e.g. BudgetApp" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea
              id="proj-desc"
              placeholder="What are you building?"
            ></textarea>
          </div>
          <div class="form-group">
            <label>Stage</label>
            <select id="proj-stage">
              <option>Planning</option>
              <option>In Progress</option>
              <option>Testing</option>
              <option>Completed</option>
            </select>
          </div>
          <div class="form-group">
            <label>Support needed</label>
            <select id="proj-support">
              <option>No support needed</option>
              <option>Need a designer</option>
              <option>Need a backend dev</option>
              <option>Need a frontend dev</option>
              <option>Need feedback</option>
            </select>
          </div>
          <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save" onclick="saveProject()">
              Save Project
            </button>
          </div>
        </div>
      </div>

      <!-- PROJECTS LIST -->
      <div id="projects-list">
        <div class="project-card">
          <div class="project-header">
            <div>
              <h3>MzansiBuilds</h3>
              <p>A platform for SA developers to build in public</p>
            </div>
          </div>
          <div class="badges">
            <span class="badge badge-green">In Progress</span>
            <span class="badge badge-yellow">Need feedback</span>
          </div>
          <div class="milestones">
            <h4>Milestones</h4>
            <div class="milestone">
              <div class="milestone-dot"></div>
              Set up project structure
            </div>
            <div class="milestone">
              <div class="milestone-dot"></div>
              Build login page
            </div>
            <div class="milestone">
              <div class="milestone-dot pending"></div>
              Build feed page
            </div>
            <div class="milestone">
              <div class="milestone-dot pending"></div>
              Deploy app
            </div>
            <div class="add-milestone">
              <input type="text" placeholder="Add new milestone..." id="ms1" />
              <button onclick="addMilestone('ms1', this)">Add</button>
            </div>
          </div>
          <button class="complete-btn" onclick="markComplete(this)">
            Mark as Completed 🎉
          </button>
        </div>
      </div>
    </div>

    <script>
      function openModal() {
        document.getElementById("modal").classList.add("open");
      }
      function closeModal() {
        document.getElementById("modal").classList.remove("open");
      }
      function saveProject() {
        const name = document.getElementById("proj-name").value.trim();
        const desc = document.getElementById("proj-desc").value.trim();
        const stage = document.getElementById("proj-stage").value;
        const support = document.getElementById("proj-support").value;
        if (!name) return alert("Please enter a project name!");
        const id = "ms" + Date.now();
        const card = document.createElement("div");
        card.className = "project-card";
        card.innerHTML = `
        <div class="project-header">
          <div>
            <h3>${name}</h3>
            <p>${desc}</p>
          </div>
        </div>
        <div class="badges">
          <span class="badge badge-green">${stage}</span>
          <span class="badge badge-yellow">${support}</span>
        </div>
        <div class="milestones">
          <h4>Milestones</h4>
          <div class="add-milestone">
            <input type="text" placeholder="Add new milestone..." id="${id}"/>
            <button onclick="addMilestone('${id}', this)">Add</button>
          </div>
        </div>
        <button class="complete-btn" onclick="markComplete(this)">Mark as Completed 🎉</button>
      `;
        document.getElementById("projects-list").prepend(card);
        closeModal();
        document.getElementById("proj-name").value = "";
        document.getElementById("proj-desc").value = "";
      }
      function addMilestone(inputId, btn) {
        const input = document.getElementById(inputId);
        const text = input.value.trim();
        if (!text) return;
        const div = document.createElement("div");
        div.className = "milestone";
        div.innerHTML = `<div class="milestone-dot"></div> ${text}`;
        const addRow = btn.parentElement;
        addRow.parentElement.insertBefore(div, addRow);
        input.value = "";
      }
      function markComplete(btn) {
        const card = btn.closest(".project-card");
        const badge = card.querySelector(".badge-green");
        if (badge) badge.textContent = "Completed";
        btn.textContent = "✅ Completed!";
        btn.disabled = true;
        btn.style.background = "#333";
        setTimeout(() => {
          window.location.href = "wall.html";
        }, 1500);
      }
    </script>
  </body>
</html>
