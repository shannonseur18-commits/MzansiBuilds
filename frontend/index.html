<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MzansiBuilds – Build in Public</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --green-dark: #0f3d1f;
        --green-main: #1a5c2a;
        --green-light: #2d8c47;
        --green-pale: #eaf3de;
        --black: #0d0d0d;
        --white: #ffffff;
        --gray: #f5f5f3;
        --gray-border: #e0e0dc;
        --text-muted: #6b7280;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--black);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background-image:
          radial-gradient(ellipse at 20% 50%, #0f3d1f44 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, #1a5c2a33 0%, transparent 50%);
      }

      .container {
        width: 100%;
        max-width: 440px;
      }

      .logo {
        text-align: center;
        margin-bottom: 36px;
      }

      .logo h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 32px;
        font-weight: 700;
        color: var(--white);
        letter-spacing: -1px;
      }

      .logo h1 span {
        color: var(--green-light);
      }

      .logo p {
        font-size: 13px;
        color: #9ca3af;
        margin-top: 6px;
        letter-spacing: 0.5px;
      }

      .card {
        background: var(--white);
        border-radius: 16px;
        padding: 36px;
        border: 1px solid var(--gray-border);
      }

      .tabs {
        display: flex;
        background: var(--gray);
        border-radius: 10px;
        padding: 4px;
        margin-bottom: 28px;
      }

      .tab {
        flex: 1;
        padding: 10px;
        text-align: center;
        font-size: 14px;
        font-weight: 500;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--text-muted);
        border: none;
        background: transparent;
      }

      .tab.active {
        background: var(--green-main);
        color: var(--white);
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: var(--black);
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid var(--gray-border);
        border-radius: 10px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        color: var(--black);
        background: var(--white);
        transition: border-color 0.2s;
        outline: none;
      }

      input:focus {
        border-color: var(--green-main);
      }

      .btn {
        width: 100%;
        padding: 13px;
        background: var(--green-main);
        color: var(--white);
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 500;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        margin-top: 8px;
        transition:
          background 0.2s,
          transform 0.1s;
      }

      .btn:hover {
        background: var(--green-dark);
      }
      .btn:active {
        transform: scale(0.98);
      }

      .divider {
        text-align: center;
        font-size: 12px;
        color: var(--text-muted);
        margin: 20px 0;
        position: relative;
      }

      .divider::before,
      .divider::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 42%;
        height: 1px;
        background: var(--gray-border);
      }
      .divider::before {
        left: 0;
      }
      .divider::after {
        right: 0;
      }

      .hidden {
        display: none;
      }

      .tagline {
        text-align: center;
        font-size: 12px;
        color: #9ca3af;
        margin-top: 20px;
      }

      .tagline span {
        color: var(--green-light);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <h1>Mzansi<span>Builds</span></h1>
        <p>Build in public. Grow together. 🇿🇦</p>
      </div>

      <div class="card">
        <div class="tabs">
          <button class="tab active" onclick="showTab('login')">Sign In</button>
          <button class="tab" onclick="showTab('register')">Register</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="login-form">
          <div class="form-group">
            <label>Email address</label>
            <input type="email" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" />
          </div>
          <button class="btn" onclick="window.location.href = 'feed.html'">
            Sign In
          </button>
          <div class="divider">or</div>
          <p
            style="
              text-align: center;
              font-size: 13px;
              color: var(--text-muted);
            "
          >
            No account?
            <span
              style="
                color: var(--green-main);
                cursor: pointer;
                font-weight: 500;
              "
              onclick="showTab('register')"
              >Register here</span
            >
          </p>
        </div>

        <!-- REGISTER FORM -->
        <div id="register-form" class="hidden">
          <div class="form-group">
            <label>Full name</label>
            <input type="text" placeholder="Shannon Seur" />
          </div>
          <div class="form-group">
            <label>Email address</label>
            <input type="email" placeholder="you@example.com" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Create a password" />
          </div>
          <button class="btn" onclick="window.location.href = 'feed.html'">
            Create Account
          </button>
          <div class="divider">or</div>
          <p
            style="
              text-align: center;
              font-size: 13px;
              color: var(--text-muted);
            "
          >
            Already have an account?
            <span
              style="
                color: var(--green-main);
                cursor: pointer;
                font-weight: 500;
              "
              onclick="showTab('login')"
              >Sign in</span
            >
          </p>
        </div>
      </div>

      <p class="tagline">
        Powered by <span>South African developers</span> building the future
      </p>
    </div>

    <script>
      function showTab(tab) {
        document
          .getElementById("login-form")
          .classList.toggle("hidden", tab !== "login");
        document
          .getElementById("register-form")
          .classList.toggle("hidden", tab !== "register");
        document.querySelectorAll(".tab").forEach((t, i) => {
          t.classList.toggle(
            "active",
            (tab === "login" && i === 0) || (tab === "register" && i === 1),
          );
        });
      }
    </script>
  </body>
</html>
