<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MzansiBuilds – Reset Password</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --green-dark: #0f3d1f;
        --green-main: #1a5c2a;
        --green-light: #2d8c47;
        --black: #0d0d0d;
        --white: #ffffff;
        --gray: #f5f5f3;
        --gray-border: #e0e0dc;
        --text-muted: #6b7280;
        --red: #ef4444;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--black);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background-image:
          radial-gradient(ellipse at 20% 50%, #0f3d1f44 0%, transparent 60%),
          radial-gradient(ellipse at 80% 20%, #1a5c2a33 0%, transparent 50%);
      }
      .container {
        width: 100%;
        max-width: 440px;
      }
      .logo {
        text-align: center;
        margin-bottom: 36px;
      }
      .logo h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 32px;
        font-weight: 700;
        color: var(--white);
        letter-spacing: -1px;
      }
      .logo h1 span {
        color: var(--green-light);
      }
      .logo p {
        font-size: 13px;
        color: #9ca3af;
        margin-top: 6px;
      }
      .card {
        background: var(--white);
        border-radius: 16px;
        padding: 36px;
        border: 1px solid var(--gray-border);
      }
      .card h2 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--black);
        margin-bottom: 8px;
      }
      .card p {
        font-size: 13px;
        color: var(--text-muted);
        margin-bottom: 24px;
      }
      .form-group {
        margin-bottom: 18px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: var(--black);
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid var(--gray-border);
        border-radius: 10px;
        font-size: 14px;
        font-family: "Inter", sans-serif;
        color: var(--black);
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: var(--green-main);
      }
      input.error-input {
        border-color: var(--red);
      }
      .password-wrapper {
        position: relative;
      }
      .password-wrapper input {
        padding-right: 44px;
      }
      .eye-btn {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        padding: 4px;
        display: flex;
        align-items: center;
      }
      .eye-btn:hover {
        color: var(--black);
      }
      .field-error {
        font-size: 12px;
        color: var(--red);
        margin-top: 5px;
        display: none;
      }
      .field-error.show {
        display: block;
      }
      .btn {
        width: 100%;
        padding: 13px;
        background: var(--green-main);
        color: var(--white);
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 500;
        font-family: "Inter", sans-serif;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.2s;
      }
      .btn:hover {
        background: var(--green-dark);
      }
      .btn:disabled {
        background: #9ca3af;
        cursor: not-allowed;
      }
      .error-msg {
        color: var(--red);
        font-size: 13px;
        margin-top: 10px;
        text-align: center;
        display: none;
      }
      .error-msg.show {
        display: block;
      }
      .success-msg {
        color: var(--green-main);
        font-size: 13px;
        margin-top: 10px;
        text-align: center;
        display: none;
      }
      .success-msg.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <h1>Mzansi<span>Builds</span></h1>
        <p>Build in public. Grow together. 🇿🇦</p>
      </div>

      <div class="card">
        <h2>Reset your password</h2>
        <p>Enter your new password below and save it to log back in.</p>

        <div class="form-group">
          <label>New password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="new-password"
              placeholder="Enter new password (min 6 characters)"
            />
            <button
              class="eye-btn"
              onclick="toggleEye('new-password', 'eye1')"
              type="button"
            >
              <svg
                id="eye1"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <p class="field-error" id="pass-err">
            Password must be at least 6 characters
          </p>
        </div>

        <div class="form-group">
          <label>Confirm new password</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="confirm-password"
              placeholder="Confirm your new password"
            />
            <button
              class="eye-btn"
              onclick="toggleEye('confirm-password', 'eye2')"
              type="button"
            >
              <svg
                id="eye2"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <p class="field-error" id="confirm-err">Passwords do not match</p>
        </div>

        <button class="btn" onclick="resetPassword()">Save New Password</button>
        <p class="error-msg" id="reset-error"></p>
        <p class="success-msg" id="reset-success"></p>
      </div>
    </div>

    <script type="module">
      // Import Supabase client
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      // Initialise Supabase
      const supabase = createClient(
        "https://soqkgdjjupqxjvmpsuxd.supabase.co",
        "sb_publishable_EP-CaxQNoNQwsdQuKbMh7w_vInlh_eF",
      );

      // Toggle password visibility
      window.toggleEye = function (inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
          input.type = "text";
          icon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        `;
        } else {
          input.type = "password";
          icon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
        }
      };

      // Clear password error as user types
      document
        .getElementById("new-password")
        .addEventListener("input", function () {
          this.classList.remove("error-input");
          document.getElementById("pass-err").classList.remove("show");
        });

      // Clear confirm password error as user types
      document
        .getElementById("confirm-password")
        .addEventListener("input", function () {
          this.classList.remove("error-input");
          document.getElementById("confirm-err").classList.remove("show");
        });

      // Save the new password to Supabase
      window.resetPassword = async function () {
        const newPassword = document.getElementById("new-password").value;
        const confirmPassword =
          document.getElementById("confirm-password").value;
        let valid = true;

        // Validate password length
        if (!newPassword || newPassword.length < 6) {
          document.getElementById("pass-err").classList.add("show");
          document.getElementById("new-password").classList.add("error-input");
          valid = false;
        } else {
          document
            .getElementById("new-password")
            .classList.remove("error-input");
        }

        // Validate passwords match
        if (newPassword !== confirmPassword) {
          document.getElementById("confirm-err").classList.add("show");
          document
            .getElementById("confirm-password")
            .classList.add("error-input");
          valid = false;
        } else {
          document
            .getElementById("confirm-password")
            .classList.remove("error-input");
        }

        if (!valid) return;

        // Disable button while saving
        const btn = document.querySelector(".btn");
        btn.disabled = true;
        btn.textContent = "Saving...";

        // Update password in Supabase
        const { error } = await supabase.auth.updateUser({
          password: newPassword,
        });

        btn.disabled = false;
        btn.textContent = "Save New Password";

        if (error) {
          document.getElementById("reset-error").textContent = error.message;
          document.getElementById("reset-error").classList.add("show");
          return;
        }

        // Show success and redirect to login after 2 seconds
        document.getElementById("reset-success").textContent =
          "✅ Password updated! Redirecting to login...";
        document.getElementById("reset-success").classList.add("show");
        setTimeout(() => (window.location.href = "index.html"), 2000);
      };
    </script>
  </body>
</html>
