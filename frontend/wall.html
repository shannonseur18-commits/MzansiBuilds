<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MzansiBuilds – Celebration Wall</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --green-dark: #0f3d1f;
        --green-main: #1a5c2a;
        --green-light: #2d8c47;
        --green-pale: #eaf3de;
        --black: #0d0d0d;
        --white: #ffffff;
        --gray: #f5f5f3;
        --gray-border: #e0e0dc;
        --text-muted: #6b7280;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--gray);
        min-height: 100vh;
      }
      nav {
        background: var(--green-dark);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      nav h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: var(--white);
      }
      nav h1 span {
        color: #2d8c47;
      }
      .nav-links {
        display: flex;
        gap: 6px;
      }
      .nav-links a {
        color: #9ca3af;
        text-decoration: none;
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 20px;
        transition: all 0.2s;
      }
      .nav-links a.active,
      .nav-links a:hover {
        background: var(--green-main);
        color: var(--white);
      }
      .main {
        max-width: 700px;
        margin: 0 auto;
        padding: 24px 16px;
      }
      .wall-header {
        text-align: center;
        margin-bottom: 32px;
        padding: 32px 20px;
        background: var(--green-dark);
        border-radius: 16px;
        color: var(--white);
      }
      .wall-header h2 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .wall-header p {
        font-size: 14px;
        color: #9ca3af;
      }
      .confetti {
        font-size: 32px;
        margin-bottom: 12px;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: var(--white);
        border-radius: 12px;
        padding: 16px;
        text-align: center;
        border: 1px solid var(--gray-border);
      }
      .stat-card strong {
        display: block;
        font-family: "Space Grotesk", sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--green-main);
      }
      .stat-card span {
        font-size: 12px;
        color: var(--text-muted);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 14px;
      }
      .dev-card {
        background: var(--white);
        border-radius: 14px;
        padding: 20px;
        border: 1px solid var(--gray-border);
        text-align: center;
        transition:
          box-shadow 0.2s,
          transform 0.2s;
      }
      .dev-card:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        transform: translateY(-2px);
      }
      .dev-avatar {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: var(--green-main);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--white);
        font-size: 18px;
        font-weight: 700;
        font-family: "Space Grotesk", sans-serif;
        margin: 0 auto 12px;
      }
      .dev-card h3 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 15px;
        font-weight: 700;
        color: var(--black);
        margin-bottom: 4px;
      }
      .dev-card .project-name {
        font-size: 13px;
        color: var(--green-main);
        font-weight: 500;
        margin-bottom: 8px;
      }
      .dev-card .desc {
        font-size: 12px;
        color: var(--text-muted);
        line-height: 1.5;
        margin-bottom: 12px;
      }
      .completed-date {
        font-size: 11px;
        background: var(--green-pale);
        color: var(--green-dark);
        padding: 3px 10px;
        border-radius: 20px;
        display: inline-block;
      }
      .loading {
        text-align: center;
        padding: 20px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <nav>
      <h1>Mzansi<span>Builds</span></h1>
      <div class="nav-links">
        <a href="feed.html">Feed</a>
        <a href="projects.html">My Projects</a>
        <a href="wall.html" class="active">Wall 🎉</a>
        <a href="index.html">Sign Out</a>
      </div>
    </nav>
    <div class="main">
      <div class="wall-header">
        <div class="confetti">🎉</div>
        <h2>Celebration Wall</h2>
        <p>Developers who built in public and shipped their projects</p>
      </div>
      <div class="stats">
        <div class="stat-card">
          <strong id="total-count">0</strong><span>Projects Shipped</span>
        </div>
        <div class="stat-card"><strong>🇿🇦</strong><span>Built in SA</span></div>
        <div class="stat-card">
          <strong>100%</strong><span>Built in Public</span>
        </div>
      </div>
      <div class="grid" id="wall-grid">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
      const supabase = createClient(
        "https://soqkgdjjupqxjvmpsuxd.supabase.co",
        "sb_publishable_EP-CaxQNoNQwsdQuKbMh7w_vInlh_eF",
      );

      function getInitials(name) {
        return name
          .split(" ")
          .map((w) => w[0])
          .join("")
          .toUpperCase()
          .slice(0, 2);
      }

      async function loadWall() {
        const { data: projects } = await supabase
          .from("projects")
          .select("*")
          .eq("is_completed", true)
          .order("created_at", { ascending: false });

        const grid = document.getElementById("wall-grid");
        document.getElementById("total-count").textContent =
          projects?.length || 0;

        if (!projects || projects.length === 0) {
          grid.innerHTML =
            '<div class="loading">No completed projects yet. Be the first! 🚀</div>';
          return;
        }

        grid.innerHTML = projects
          .map(
            (p) => `
        <div class="dev-card">
          <div class="dev-avatar">${getInitials(p.author_name || "U")}</div>
          <h3>${p.author_name || "Anonymous"}</h3>
          <div class="project-name">${p.name}</div>
          <div class="desc">${p.description || "Built in public on MzansiBuilds 🚀"}</div>
          <span class="completed-date">${new Date(p.created_at).toLocaleDateString("en-ZA", { month: "long", year: "numeric" })}</span>
        </div>
      `,
          )
          .join("");
      }

      loadWall();
    </script>
  </body>
</html>
